services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: media_quality
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_quality"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  analyzer:
    build:
      context: ./analyzer
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_quality?schema=public
      JWT_SECRET: change_me_super_secret
      JWT_EXPIRES_IN: 24h
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: media-content
      ANALYZER_URL: http://analyzer:8000
    depends_on:
      postgres:
        condition: service_healthy
      analyzer:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  minio_data:
